services:
  postgres:
    image: postgres:16
    container_name: telecom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: telecom_support
      POSTGRES_USER: telecom_user
      POSTGRES_PASSWORD: telecom_password
    ports:
      - "5433:5432"
    volumes:
      - telecom_postgres_data:/var/lib/postgresql/data
  mongo:
    image: mongo:7
    container_name: telecom-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - telecom_mongo_data:/data/db

volumes:
  telecom_postgres_data:
  telecom_mongo_data: